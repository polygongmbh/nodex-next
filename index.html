<!doctype html>
<html lang="en" class="app-loading">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nodex" />
    <title>Nodex</title>
    <style>
      /* Express splash painted before any JS loads. On startup the two logo
         strokes slide TOGETHER (converge into the glyph). Dismissal
         (dismissSplash in src/lib/splash.ts) either fades the overlay out
         (signed in) or glides the assembled glyph into the sign-in card's
         logo position (signed out). The stroke uses the primary accent
         (--brand #4785FF) in BOTH color schemes. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafafc;
        /* Fade to zero-alpha of the SAME color (not `transparent`) to avoid an
           interpolated grey flash. */
        transition: background-color 650ms ease;
      }
      @media (prefers-color-scheme: dark) {
        #splash { background: #000000; }
      }
      #splash svg {
        width: 62vmin;
        height: 62vmin;
        overflow: visible;
        /* The dismissal glide (transform set by splash.ts). */
        transition: transform 650ms cubic-bezier(0.22, 1, 0.36, 1), opacity 400ms ease;
      }
      #splash .glyph path {
        stroke: #4785ff;
      }
      /* Startup: strokes converge along their shared diagonal axis.
         path order: 1 = lower-left stroke, 2 = upper-right. */
      #splash .glyph path:nth-of-type(1) {
        animation: stroke-in-1 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #splash .glyph path:nth-of-type(2) {
        animation: stroke-in-2 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes stroke-in-1 {
        from { transform: translate(-150px, -160px); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
      @keyframes stroke-in-2 {
        from { transform: translate(150px, 160px); opacity: 0; }
        to { transform: none; opacity: 1; }
      }
      #splash.splash-hide {
        pointer-events: none;
        background-color: rgb(250 250 252 / 0);
      }
      @media (prefers-color-scheme: dark) {
        #splash.splash-hide { background-color: rgb(0 0 0 / 0); }
      }
      /* Signed-in dismissal: the whole glyph fades where it stands. */
      #splash.splash-fade svg { opacity: 0; }
      #app { transition: opacity 650ms ease; }
      html.app-loading #app { opacity: 0; }
      @media (prefers-reduced-motion: reduce) {
        #splash, #app { transition-duration: 200ms; }
        #splash svg { transition: opacity 200ms ease; }
        #splash .glyph path { animation-duration: 1ms; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="splash">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
        <g
          class="glyph"
          transform="translate(-54.08,-13.59) scale(1.12)"
          fill="none"
          stroke-width="31.104"
          stroke-linecap="round"
        >
          <path d="M90.4329 180.698L90.0113 86.1228C89.9973 82.9897 93.8252 81.4563 95.9781 83.7326L166.928 158.748" />
          <path d="M202.53 40.0443L202.952 134.619C202.966 137.752 199.138 139.286 196.985 137.01L126.035 61.9938" />
        </g>
      </svg>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
