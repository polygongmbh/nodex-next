# Co-op Cloud style stack file. Deploy with abra (as a recipe) or, on a plain
# swarm, with ./deploy/deploy.sh — it pulls, builds a uniquely-tagged local
# image, derives ROUTER_RULE (the Traefik host rule) from DOMAINS/DOMAIN, and
# runs `docker stack deploy`. Do NOT use a bare `docker stack deploy`:
# ROUTER_RULE stays empty and Traefik builds no router.
#
# Two unrelated env files — do not confuse them:
#   deploy/.env      - THIS stack's deployment config (DOMAIN, STACK_NAME,
#                      IMAGE, LETS_ENCRYPT_ENV). Read by deploy/deploy.sh,
#                      consumed by docker/Traefik. See deploy/.env.sample.
#   <repo root>/.env - the app's Vite build-time config (VITE_NOAS_HOST_URL,
#                      VITE_SPACE_PROBE_SUBDOMAINS), baked into the JS bundle
#                      when `docker build` runs `npm run build`. Must exist in
#                      the build context BEFORE `docker build -t ...` runs;
#                      this stack file and `docker stack deploy` never read
#                      it. See .env.example.
version: "3.8"

services:
  app:
    image: ${IMAGE:-nodex-next:latest}
    networks:
      - proxy
    healthcheck:
      # 127.0.0.1, not localhost: the image serves IPv4-only (the ipv6 entrypoint
      # script skips custom configs), and localhost can resolve to ::1 first.
      # -O /dev/null avoids BusyBox wget's --spider quirks.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        # ROUTER_RULE is precomputed by deploy/deploy.sh from DOMAINS/DOMAIN
        # (e.g. Host(`a`) || Host(`b`)). No nested-${} default here: compose
        # interpolation does NOT expand ${DOMAIN} inside a :- default, so it
        # silently yields a broken rule. deploy.sh (or abra) must set ROUTER_RULE.
        - "traefik.http.routers.${STACK_NAME}.rule=${ROUTER_RULE}"
        - "traefik.http.routers.${STACK_NAME}.entrypoints=web-secure"
        - "traefik.http.routers.${STACK_NAME}.tls.certresolver=${LETS_ENCRYPT_ENV}"
        - "traefik.http.services.${STACK_NAME}.loadbalancer.server.port=80"
        - "coop-cloud.${STACK_NAME}.version=0.1.0+0.1.0"

networks:
  proxy:
    external: true
